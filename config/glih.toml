[project]
name = "GLIH"
environment = "dev"
client = "Lineage Logistics"
use_case = "Cold Chain Intelligence & Automation"

[storage]
mode = "local"
raw_data_dir = "data/raw"
processed_data_dir = "data/processed"
s3_bucket = ""
s3_prefix = "glih/"
azure_container = ""
gcs_bucket = ""

[vector_store]
provider = "chromadb"
collection = "glih-default"

[vector_store.chromadb]
persist_directory = "data/chromadb"
distance_metric = "cosine"

[vector_store.faiss]
index_type = "IndexFlatL2"
persist_directory = "data/faiss"
nlist = 100
m = 16

[vector_store.pinecone]
api_key_env = "PINECONE_API_KEY"
environment = "us-east-1-aws"
index_name = "glih-index"
dimension = 1024
metric = "cosine"
pod_type = "p1.x1"

[vector_store.weaviate]
url = "http://localhost:8080"
api_key_env = "WEAVIATE_API_KEY"
class_name = "GlihDocument"
distance_metric = "cosine"

[vector_store.qdrant]
url = "http://localhost:6333"
api_key_env = "QDRANT_API_KEY"
collection_name = "glih_collection"
distance_metric = "Cosine"

[vector_store.milvus]
host = "localhost"
port = 19530
collection_name = "glih_collection"
index_type = "IVF_FLAT"
metric_type = "L2"

[embeddings]
provider = "openai"
openai_model = "text-embedding-3-small"
hf_model = "sentence-transformers/all-MiniLM-L6-v2"
mistral_model = "mistral-embed"

[llm]
provider = "openai"
model = "gpt-4o"
api_key_env = "OPENAI_API_KEY"

[agents]
enabled = [
    "AnomalyResponder",
    "RouteAdvisor",
    "CustomerNotifier",
    "OpsSummarizer",
]
anomaly_temperature_threshold_c = 2.0
anomaly_temperature_critical_c = 5.0
anomaly_response_time_target_minutes = 5
anomaly_notification_channels = [
    "email",
    "sms",
    "webhook",
]
route_max_delay_minutes = 30
route_spoilage_risk_threshold = 0.7
route_optimization_enabled = true
route_weather_integration = true
customer_notification_channel = "email"
customer_notification_tone = "professional"
customer_proactive_updates = true
ops_summary_window_hours = 24
ops_summary_schedule = "shift_end"
ops_export_format = "pdf"

[backend]
host = "0.0.0.0"
port = 8000
log_level = "INFO"
max_workers = 4

[integrations]
weather_api_enabled = false
traffic_api_enabled = false
wms_integration_enabled = false
tms_integration_enabled = false
iot_sensor_integration_enabled = false

[frontend]
backend_url = "http://localhost:8000"

[lineage]
facilities = [
    "Chicago",
    "Dallas",
    "Atlanta",
    "Los Angeles",
    "Seattle",
]
product_types = [
    "Seafood",
    "Dairy",
    "Frozen Foods",
    "Produce",
    "Meat",
]
compliance_standards = [
    "HACCP",
    "FDA",
    "FSMA",
    "GMP",
]
sop_collection = "lineage-sops"
route_history_collection = "lineage-routes"

[lineage.temperature_ranges]
Seafood = [
    -2,
    2,
]
Dairy = [
    0,
    4,
]
FrozenFoods = [
    -25,
    -18,
]
Produce = [
    0,
    10,
]
Meat = [
    -2,
    4,
]

[mcp]
enabled = true
timeout_seconds = 30
retry_attempts = 3
cache_ttl_seconds = 300

# MCP Connector Configuration
# All connectors work in demo mode when API keys are not configured
[mcp.connectors]

[mcp.connectors.gps_trace]
# GPS-Trace MCP Server for truck/vehicle tracking
# Get your API token from https://gps-trace.com or https://ruhavik.com
enabled = true
api_token = ""  # Leave empty for demo mode
endpoint = "https://mcp.gps-trace.com/mcp"
description = "Real-time truck tracking, mileage, engine hours, geofences"

[mcp.connectors.openweathermap]
# OpenWeatherMap for route weather forecasts
# Get your API key from https://openweathermap.org/api
enabled = true
api_key = ""  # Leave empty for demo mode
description = "Weather forecasts for route planning and spoilage risk"

[mcp.connectors.iot]
# Lineage IoT Sensors (temperature, door, humidity)
# Connect via MQTT broker or HTTP API gateway
enabled = true
mode = "demo"  # demo | mqtt | api
mqtt_broker = ""
mqtt_port = 1883
mqtt_username = ""
mqtt_password = ""
api_endpoint = ""  # e.g., http://iot-gateway.lineage.local:8080
api_key = ""
description = "Temperature sensors, door status, humidity monitoring"

[mcp.connectors.traffic]
# Traffic and routing API (Google Maps, HERE, or Mapbox)
enabled = false
provider = ""  # google | here | mapbox
api_key = ""
description = "Real-time traffic for ETA optimization"

[mcp.connectors.samsara_eld]
# Samsara ELD — Electronic Logging Device / Hours-of-Service compliance
# Get API key from https://cloud.samsara.com/settings/api-tokens
enabled = true
api_key = ""  # Leave empty for demo mode
description = "ELD compliance, driver HOS status, violation alerts, driver logs"

[mcp.connectors.dat_load_board]
# DAT Load Board — carrier/broker load matching and rate forecasting
# Get credentials from https://www.dat.com/solutions/power-broker
enabled = true
username = ""  # Leave empty for demo mode
password = ""
description = "Available loads, lane rate forecasts, truck posting for backhaul"

[mcp.connectors.tms]
# TMS Integration — McLeod Software / Oracle Transportation Management
enabled = true
provider = ""  # mcleod | oracle | mercurygate
endpoint = ""  # e.g., https://tms.lineage.com/api
api_key = ""   # Leave empty for demo mode
description = "Shipment orders, delivery status updates, dispatch integration"

[mcp.connectors.geofence]
# Geofencing & POI — Google Maps / HERE Platform
# Get API key from https://developers.google.com/maps or https://platform.here.com
enabled = true
provider = "here"  # google | here | mapbox
api_key = ""  # Leave empty for demo mode
description = "Geofence alerts, nearby fuel stops & rest areas, POI lookup"

[mcp.connectors.usda_compliance]
# USDA/FDA Compliance — public food safety APIs (no key required)
# Uses FDA Enforcement Reports API — always live
enabled = true
description = "HACCP compliance checks, FDA recall alerts, FSMA temperature log verification"

[mcp.connectors.eia_fuel]
# EIA Fuel Prices — U.S. Energy Information Administration (free public API)
# Optional API key from https://www.eia.gov/opendata/ for higher rate limits
enabled = true
api_key = ""  # Optional — public API works without key
description = "National/regional diesel prices, fuel surcharge calculation, price trend analysis"

[mcp.connectors.predictive_maintenance]
# Predictive Maintenance — vehicle health monitoring via Samsara or Fleet Complete
enabled = true
provider = "samsara"  # samsara | fleet_complete | geotab
api_key = ""  # Leave empty for demo mode (can share Samsara key from samsara_eld)
description = "Vehicle health scores, fault codes, oil/brake/tire alerts, service scheduling"

[mcp.connectors.port_status]
# Port & Intermodal Status — MarineTraffic / Portcast API
# Get API key from https://www.marinetraffic.com/en/online-services/plans
enabled = true
api_key = ""  # Leave empty for demo mode
description = "Port congestion levels, vessel tracking, container status, intermodal routing"

[mcp.connectors.twilio_pod]
# Twilio — Customer notifications & Proof of Delivery
# Get credentials from https://console.twilio.com
enabled = true
account_sid = ""  # Leave empty for demo mode
auth_token = ""
from_number = ""  # Twilio phone number e.g., +15551234567
description = "Delivery ETA alerts via SMS, POD confirmation texts, customer status updates"

[mcp.connectors.insurance_claims]
# Insurance & Claims — Riskonnect / custom insurance API
enabled = true
endpoint = ""  # Leave empty for demo mode
api_key = ""
description = "Cargo claim filing, claim status tracking, coverage summary, policy management"

[[mcp.servers]]
name = "lineage-wms"
url = "http://localhost:8080"
description = "WMS/TMS data access for shipments and inventory"
enabled = true

[[mcp.servers]]
name = "lineage-iot"
url = "http://localhost:8081"
description = "IoT sensor data streaming (temperature, GPS, door status)"
enabled = true

[[mcp.servers]]
name = "lineage-docs"
url = "http://localhost:8082"
description = "Document storage access (invoices, BOLs, SOPs)"
enabled = true
