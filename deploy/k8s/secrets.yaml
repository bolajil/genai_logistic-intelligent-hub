apiVersion: v1
kind: Secret
metadata:
  name: glih-secrets
  namespace: glih
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
  POSTGRES_USER: "${POSTGRES_USER}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  GPS_TRACE_API_TOKEN: "${GPS_TRACE_API_TOKEN}"
  OPENWEATHERMAP_API_KEY: "${OPENWEATHERMAP_API_KEY}"
  IOT_API_KEY: "${IOT_API_KEY}"
  TRAFFIC_API_KEY: "${TRAFFIC_API_KEY}"
  JWT_SECRET: "${JWT_SECRET}"
  GLIH_ADMIN_PASSWORD: "${GLIH_ADMIN_PASSWORD}"
  GLIH_DISPATCHER_PASSWORD: "${GLIH_DISPATCHER_PASSWORD}"
  DISPATCHER_ADMIN_PASSWORD: "${DISPATCHER_ADMIN_PASSWORD}"
  # Phase 1-3 MCP connectors
  SAMSARA_API_KEY: "${SAMSARA_API_KEY}"
  DAT_USERNAME: "${DAT_USERNAME}"
  DAT_PASSWORD: "${DAT_PASSWORD}"
  TMS_ENDPOINT: "${TMS_ENDPOINT}"
  TMS_API_KEY: "${TMS_API_KEY}"
  GEOFENCE_API_KEY: "${GEOFENCE_API_KEY}"
  EIA_API_KEY: "${EIA_API_KEY}"
  PORT_STATUS_API_KEY: "${PORT_STATUS_API_KEY}"
  TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
  TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
  TWILIO_FROM_NUMBER: "${TWILIO_FROM_NUMBER}"
  INSURANCE_ENDPOINT: "${INSURANCE_ENDPOINT}"
  INSURANCE_API_KEY: "${INSURANCE_API_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: glih-secrets-template
  namespace: glih
  annotations:
    description: "Template - replace with actual values before applying"
type: Opaque
stringData:
  OPENAI_API_KEY: "sk-your-openai-key"
  POSTGRES_USER: "glih"
  POSTGRES_PASSWORD: "change-me-in-production"
  JWT_SECRET: "change-this-to-32-char-random-string"
  GLIH_ADMIN_PASSWORD: "set-a-strong-admin-password"
  GLIH_DISPATCHER_PASSWORD: "set-a-strong-dispatcher-password"
  DISPATCHER_ADMIN_PASSWORD: "set-a-strong-dispatcher-admin-password"
