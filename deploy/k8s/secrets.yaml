apiVersion: v1
kind: Secret
metadata:
  name: glih-secrets
  namespace: glih
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
  POSTGRES_USER: "${POSTGRES_USER}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  GPS_TRACE_API_TOKEN: "${GPS_TRACE_API_TOKEN}"
  OPENWEATHERMAP_API_KEY: "${OPENWEATHERMAP_API_KEY}"
  IOT_API_KEY: "${IOT_API_KEY}"
  TRAFFIC_API_KEY: "${TRAFFIC_API_KEY}"
  JWT_SECRET: "${JWT_SECRET}"
  GLIH_ADMIN_PASSWORD: "${GLIH_ADMIN_PASSWORD}"
  GLIH_DISPATCHER_PASSWORD: "${GLIH_DISPATCHER_PASSWORD}"
  DISPATCHER_ADMIN_PASSWORD: "${DISPATCHER_ADMIN_PASSWORD}"
---
apiVersion: v1
kind: Secret
metadata:
  name: glih-secrets-template
  namespace: glih
  annotations:
    description: "Template - replace with actual values before applying"
type: Opaque
stringData:
  OPENAI_API_KEY: "sk-your-openai-key"
  POSTGRES_USER: "glih"
  POSTGRES_PASSWORD: "change-me-in-production"
  JWT_SECRET: "change-this-to-32-char-random-string"
  GLIH_ADMIN_PASSWORD: "set-a-strong-admin-password"
  GLIH_DISPATCHER_PASSWORD: "set-a-strong-dispatcher-password"
  DISPATCHER_ADMIN_PASSWORD: "set-a-strong-dispatcher-admin-password"
