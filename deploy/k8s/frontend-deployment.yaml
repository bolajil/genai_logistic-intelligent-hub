apiVersion: apps/v1
kind: Deployment
metadata:
  name: glih-frontend
  namespace: glih
  labels:
    app: glih-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: glih-frontend
  template:
    metadata:
      labels:
        app: glih-frontend
    spec:
      containers:
        - name: frontend
          image: ${REGISTRY}/glih-frontend:${TAG}
          ports:
            - containerPort: 9000
          env:
            - name: NEXT_PUBLIC_BACKEND_URL
              value: "http://glih-backend:9001"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: glih-frontend
  namespace: glih
spec:
  selector:
    app: glih-frontend
  ports:
    - port: 9000
      targetPort: 9000
  type: ClusterIP
