apiVersion: apps/v1
kind: Deployment
metadata:
  name: glih-backend
  namespace: glih
  labels:
    app: glih-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: glih-backend
  template:
    metadata:
      labels:
        app: glih-backend
    spec:
      containers:
        - name: backend
          image: ${REGISTRY}/glih-backend:${TAG}
          ports:
            - containerPort: 9001
          envFrom:
            - configMapRef:
                name: glih-config
            - secretRef:
                name: glih-secrets
          env:
            - name: PYTHONPATH
              value: "/app/src"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: data-volume
              mountPath: /app/data
      volumes:
        - name: config-volume
          configMap:
            name: glih-toml-config
        - name: data-volume
          persistentVolumeClaim:
            claimName: glih-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: glih-backend
  namespace: glih
spec:
  selector:
    app: glih-backend
  ports:
    - port: 9001
      targetPort: 9001
  type: ClusterIP
