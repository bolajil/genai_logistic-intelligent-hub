name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glih-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]" || pip install ruff mypy
      - name: Ruff lint
        run: ruff check src/
      - name: Mypy type check
        run: mypy src/glih_backend/api/ --ignore-missing-imports || true

  backend-test:
    name: Backend — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glih-backend
    env:
      GLIH_LLM_PROVIDER: openai
      GLIH_LLM_MODEL: gpt-4o
      GLIH_EMBEDDINGS_PROVIDER: openai
      GLIH_EMBEDDINGS_MODEL: text-embedding-3-small
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      JWT_SECRET: ci-test-secret-at-least-32-characters
      GLIH_ADMIN_PASSWORD: ci-admin-password
      GLIH_DISPATCHER_PASSWORD: ci-dispatcher-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install pytest httpx
      - name: Run tests
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found — skipping"

  frontend-build:
    name: Frontend — build & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glih-frontend-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: glih-frontend-next/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:9001
